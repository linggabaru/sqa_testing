name: SQA Mahasiswa Baru USTI - CI Pipeline

# Pipeline ini menjalankan rangkaian pengujian otomatis setiap kali ada
# push/pull-request ke branch main, sesuai kebutuhan laporan UAS SQA:
#   1. Lint & Static Analysis  (White Box - PHPCS + PHPStan)
#   2. SonarQube Scan          (White Box - code quality & bugs)
#   3. Black Box CLI Test      (Black Box - blackbox_test.php)
#   4. Selenium Black Box      (Black Box - UI testing via .side suite)
#   5. Report                  (Menggabungkan semua hasil jadi 1 ringkasan)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1 — WHITE BOX: Lint & Static Analysis
  # ──────────────────────────────────────────────────────────
  whitebox-lint-static:
    name: "White Box - PHPCS & PHPStan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Jalankan PHP CodeSniffer (PSR-12)
        run: vendor/bin/phpcs --standard=phpcs.xml mahasiswa_baru_usti_lingga.php

      - name: Jalankan PHPStan (static analysis level 5)
        run: vendor/bin/phpstan analyse --configuration=phpstan.neon

  # ──────────────────────────────────────────────────────────
  # JOB 2 — BLACK BOX: CLI Test (blackbox_test.php)
  # ──────────────────────────────────────────────────────────
  blackbox-cli:
    name: "Black Box - CLI Test Script"
    runs-on: ubuntu-latest
    needs: whitebox-lint-static
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Jalankan PHP built-in server
        run: php -S 127.0.0.1:8000 &

      - name: Tunggu server siap
        run: sleep 2

      - name: Jalankan Black Box CLI Test
        run: php tests/blackbox_test.php
        env:
          APP_URL: http://127.0.0.1:8000/mahasiswa_baru_usti_lingga.php

  # ──────────────────────────────────────────────────────────
  # JOB 3 — BLACK BOX: Selenium UI Test
  # ──────────────────────────────────────────────────────────
  blackbox-selenium:
    name: "Black Box - Selenium UI Suite"
    runs-on: ubuntu-latest
    needs: whitebox-lint-static
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Jalankan PHP built-in server
        run: php -S 127.0.0.1:8000 &

      - name: Tunggu server siap
        run: sleep 2

      - name: Install Selenium IDE CLI (selenium-side-runner)
        run: npm install -g selenium-side-runner

      - name: Install chromedriver
        run: npm install -g chromedriver

      - name: Jalankan Suite Selenium (.side)
        run: selenium-side-runner --base-url http://127.0.0.1:8000 SQA_MahasiswaBaru_USTI.side
        continue-on-error: true

  # ──────────────────────────────────────────────────────────
  # JOB 4 — REPORT: Ringkasan Hasil Semua Job
  # ──────────────────────────────────────────────────────────
  report:
    name: "Report - Ringkasan Hasil Pengujian"
    runs-on: ubuntu-latest
    needs: [whitebox-lint-static, whitebox-sonarqube, blackbox-cli, blackbox-selenium]
    if: always()
    steps:
      - name: Cetak ringkasan hasil pipeline
        run: |
          echo "## Ringkasan SQA Mahasiswa Baru USTI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| White Box - Lint & Static | ${{ needs.whitebox-lint-static.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Black Box - CLI Test | ${{ needs.blackbox-cli.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Black Box - Selenium | ${{ needs.blackbox-selenium.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Laporan ini bisa di-screenshot langsung dari tab Actions untuk dilampirkan ke laporan UAS." >> $GITHUB_STEP_SUMMARY
