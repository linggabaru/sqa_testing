name: SQA Mahasiswa Baru USTI - CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — WHITE BOX
  # ─────────────────────────────────────────
  whitebox-lint-static:
    name: "White Box - PHPCS & PHPStan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check vendor folder
        run: ls -la vendor/bin

      - name: Jalankan PHPCS
        run: php vendor/bin/phpcs --standard=phpcs.xml mahasiswa_baru_usti_lingga.php

      - name: Jalankan PHPStan
        run: php vendor/bin/phpstan analyse --configuration=phpstan.neon


  # ─────────────────────────────────────────
  # JOB 2 — BLACK BOX CLI TEST
  # ─────────────────────────────────────────
  blackbox-cli:
    name: "Black Box - CLI Test Script"
    runs-on: ubuntu-latest
    needs: whitebox-lint-static

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Jalankan PHP built-in server
        run: php -S 127.0.0.1:8000 > /dev/null 2>&1 &

      - name: Tunggu server siap
        run: sleep 3

      - name: Jalankan Black Box CLI Test
        run: php tests/blackbox_test.php
        env:
          APP_URL: http://127.0.0.1:8000/sqa/mahasiswa_baru_usti_lingga.php


  # ─────────────────────────────────────────
  # JOB 3 — SELENIUM UI TEST
  # ─────────────────────────────────────────
  blackbox-selenium:
    name: "Black Box - Selenium UI Suite"
    runs-on: ubuntu-latest
    needs: whitebox-lint-static

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Jalankan PHP built-in server
        run: php -S 127.0.0.1:8000 > /dev/null 2>&1 &

      - name: Tunggu server siap
        run: sleep 3

      - name: Install Selenium tools
        run: |
          npm install -g selenium-side-runner
          npm install -g chromedriver

      - name: Jalankan Selenium test
        run: selenium-side-runner --base-url http://127.0.0.1:8000 SQA_MahasiswaBaru_USTI.side
        continue-on-error: true


  # ─────────────────────────────────────────
  # JOB 4 — REPORT
  # ─────────────────────────────────────────
  report:
    name: "Report - Ringkasan Hasil Pengujian"
    runs-on: ubuntu-latest
    needs: [whitebox-lint-static, blackbox-cli, blackbox-selenium]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## Ringkasan SQA Mahasiswa Baru USTI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| White Box | ${{ needs.whitebox-lint-static.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Test | ${{ needs.blackbox-cli.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Selenium | ${{ needs.blackbox-selenium.result }} |" >> $GITHUB_STEP_SUMMARY