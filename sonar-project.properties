# =============================================================
# SonarQube Configuration - Aplikasi Mahasiswa Baru USTI
# =============================================================
# Cara pakai:
#   1. Isi sonar.host.url dan token (lihat catatan di bawah)
#   2. Jalankan dari root folder project:  sonar-scanner
#   3. Hasil scan bisa dilihat di dashboard SonarQube/SonarCloud
#
# Token TIDAK disimpan di file ini (alasan keamanan).
# Set sebagai environment variable atau parameter CLI:
#   sonar-scanner -Dsonar.token=YOUR_TOKEN_DISINI
# Atau untuk GitHub Actions, simpan sebagai repo secret:
#   SONAR_TOKEN dan SONAR_HOST_URL
# =============================================================

# Identitas project
sonar.projectKey=mahasiswa-baru-usti
sonar.projectName=Aplikasi Mahasiswa Baru USTI
sonar.projectVersion=2026-2

# Lokasi source code yang akan di-scan
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclude folder yang tidak perlu di-scan
sonar.exclusions=vendor/**,node_modules/**,tests/**,*.side,*.yml,*.csv,*.md

# Folder test terpisah (untuk laporan coverage jika ada)
sonar.tests=tests
sonar.test.inclusions=tests/**/*.php

# Host SonarQube (ganti sesuai server kamu, atau pakai SonarCloud)
# Contoh self-hosted : http://localhost:9000
# Contoh SonarCloud  : https://sonarcloud.io
sonar.host.url=http://localhost:9000

# Khusus jika pakai SonarCloud, tambahkan organization key:
# sonar.organization=nama-organisasi-kamu

# Bahasa yang dianalisis
sonar.language=php

# Versi PHP minimum yang ditarget (menyesuaikan kode)
sonar.php.version=8.2

# Format laporan tambahan (opsional, untuk PHPCS/PHPStan jika diintegrasikan)
# sonar.php.coverage.reportPaths=coverage.xml
